<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VR Project</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- 加载界面 -->
  <div id="start-screen">
    <div id="loading-panel">
      <h1>VR Project</h1>

      <div id="loading-bar-bg">
        <div id="loading-bar"></div>
      </div>

      <p id="loading-text">Loading 0%</p>
    </div>

    <div id="mode-panel" class="hidden">
      <h1>选择游玩方式</h1>
      <p>请选择适合当前设备的显示模式</p>

      <button id="mobile-mode-btn">使用移动端游玩</button>
      <button id="pc-mode-btn">使用 PC 端游玩</button>
    </div>
  </div>

  <!-- 场景信息 -->
  <div id="info" class="hidden">
    <h1>VR Project</h1>
    <p>等待进入场景</p>
  </div>

  <!-- 白雾遮罩 -->
  <div id="fog-overlay"></div>

  <div id="vr-frame-overlay" class="hidden">
  <div class="eye-frame left-eye-frame"></div>
  <div class="eye-frame right-eye-frame"></div>
</div>

  <!-- 手机陀螺仪按钮 -->
  <button id="orientation-btn" class="hidden">开启手机陀螺仪</button>

  <script type="module" src="./script.js"></script>
</body>
</html>
