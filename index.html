<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VR Project</title>

  <!-- A-Frame：使用你测试过可运行的版本 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- 加载 / 教学缓冲界面 -->
  <div id="start-screen">
    <!-- 加载进度条 -->
    <div id="loading-panel" class="start-panel">
      <h1>VR Project</h1>

      <div id="loading-bar-bg">
        <div id="loading-bar"></div>
      </div>

      <p id="loading-text">Loading 0%</p>
    </div>

    <!-- 检测控制方式 -->
    <div id="detect-panel" class="start-panel hidden">
      <h1>检测控制方式</h1>
      <p id="detect-text">正在检测手柄连接，请稍候...</p>

      <div class="detect-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- 手柄教学页 -->
    <div id="controller-guide-panel" class="start-panel guide-panel hidden">
      <h1>手柄模式</h1>

      <img
        id="controller-guide-image"
        class="guide-image"
        src="./assets/ui/controller-guide.png"
        alt="手柄操作教学图"
      />

      <div class="guide-fallback">
        <p>左摇杆左右：切换意象</p>
        <p>左摇杆向下：选择完成</p>
        <p>A 键：确认 / 取消 / 完成</p>
      </div>

      <button id="enter-controller-btn" class="enter-btn">进入场景</button>
      <p class="enter-tip">也可以按 Enter 或手柄 A 键进入</p>
    </div>

    <!-- 眼神 + 点击教学页 -->
    <div id="gaze-guide-panel" class="start-panel guide-panel hidden">
      <h1>眼神控制模式</h1>

      <img
        id="gaze-guide-image"
        class="guide-image"
        src="./assets/ui/gaze-guide.png"
        alt="眼神控制教学图"
      />

      <div class="guide-fallback">
        <p>视线扫到意象：预选</p>
        <p>看着意象并点击屏幕：确认 / 取消</p>
        <p>看着完成按钮并点击：进入下一关</p>
      </div>

      <button id="enter-gaze-btn" class="enter-btn">进入场景</button>
      <p class="enter-tip">也可以按 Enter 进入</p>
    </div>
  </div>

  <!-- 场景信息 -->
  <div id="info" class="hidden">
    <h1>VR Project</h1>
    <p>等待进入场景</p>
  </div>

  <!-- 白雾遮罩 -->
  <div id="fog-overlay"></div>

  <!-- A-Frame 场景 -->
  <a-scene
  id="vr-scene"
  vr-mode-ui="enabled: true"
  embedded
  background="color: #000000"
  renderer="antialias: true; alpha: false; logarithmicDepthBuffer: true"
>
  <a-assets></a-assets>

  <!-- 玩家摄像机 -->
  <a-entity id="camera-rig" position="0 0 0">
    <a-camera
      id="main-camera"
      position="0 0 0"
      look-controls="enabled: true"
      wasd-controls="enabled: false"
    >
      <a-cursor
        id="gaze-cursor"
        class="hidden"
        fuse="false"
        raycaster="objects: .interactive-hitbox"
        material="color: white; opacity: 0.85; transparent: true"
        geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.014"
        position="0 0 -1"
      ></a-cursor>
    </a-camera>
  </a-entity>

  <a-entity id="level-root"></a-entity>
</a-scene>

  <script src="./script.js"></script>
</body>
</html>
